<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siva Nargana Portfolio</title>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-zinc-950">
  <div id="root"></div>
  <div id="modal-root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const baseUrl = "https://sivanargana.github.io/portfolio/";

    const Modal = ({ item, onClose }) => {
      return ReactDOM.createPortal(
        <div
          className="fixed inset-0 bg-black bg-opacity-90 backdrop-blur-3xl overflow-y-auto z-50"
          onClick={onClose}
        >
          <div className={`mx-auto max-w-full p-5 ${item.mobile ? 'w-[500px]' : 'w-[1280px]'}`} onClick={e => e.stopPropagation()}>
              <div className="sticky top-0 z-10 flex items-center justify-between px-4 py-3 bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md rounded-b-2xl -mt-5 mb-5" >
                <h2 className="text-xl font-semibold text-black dark:text-white">{item.name}</h2>
                <button
                  onClick={onClose}
                  className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors text-gray-500 hover:text-black dark:hover:text-white"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                  </svg>
                </button>
              </div>
            <div className={`${!item.multiple ? 'shadow-[0px_0px_0px_3px_black,_0px_0px_0px_6px_rgba(255,255,255,0.2)] rounded-2xl overflow-hidden' : ''}`}>
            
        
              <div className="flex flex-col" style={{ gap: item.space ?? 60, backgroundColor: item.bg ?? "transparent" }}>
                {item.images.map((img, i) => <div key={i} className={`${item.multiple ? 'shadow-[0px_0px_0px_3px_black,_0px_0px_0px_6px_rgba(255,255,255,0.2)] rounded-2xl overflow-hidden' : ''}`}>
                  <img src={baseUrl + img} className="w-full" />
                </div>)}
              </div>
            </div>
          </div>
        </div>,
        document.getElementById('modal-root')
      );
    };
    const App = () => {
      const [portfolio, setPortfolio] = useState([]);
      const [selected, setSelected] = useState(null);
      useEffect(() => {
        if (selected) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
      }, [selected]);
      useEffect(() => {
        fetch('./portfolio.json')
          .then(res => res.json())
          .then(data => setPortfolio(data.portfolio))
      }, []);
      return (
        <div className="p-8">
          <div className="grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-6">
            {portfolio.map((item, index) => (
              <div
                key={index}
                onClick={() => setSelected(item)}
                className="bg-white dark:bg-zinc-900 rounded-lg shadow-[0_0_10px] shadow-black/10 overflow-hidden cursor-pointer hover:shadow-xl transition-shadow"
              >
                <div className="aspect-video">
                  <img
                    src={baseUrl + item.thumbnail}
                    alt={item.name}
                    className="w-full h-full object-cover"
                  />
                </div>
                <div className="p-4">
                  <h2 className="text-xl font-medium mb-2 text-black dark:text-white">{item.name}</h2>
                  <div className="flex gap-2">
                    {item.tools.map((tool, i) => (
                      <span key={i} className="bg-gray-200 text-black dark:bg-zinc-700 dark:text-white px-2 py-1 rounded text-sm">
                        {tool}
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            ))}
          </div>
          {selected && <Modal item={selected} onClose={() => setSelected(null)} />}
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
